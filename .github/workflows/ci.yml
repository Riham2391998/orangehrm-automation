
name: OrangeHRM Selenium Tests

# ---- WHEN to run this workflow ----
on:
  push:
    branches: [ main, master ]   # Trigger on push to main or master branch
  pull_request:
    branches: [ main, master ]   # Also trigger on pull requests

jobs:
  # ---- JOB: Run the automated tests ----
  run-tests:
    name: Run Selenium Tests
    runs-on: ubuntu-latest  # Use the latest Ubuntu virtual machine

    steps:

      # STEP 1: Download your repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # STEP 2: Install Java 11
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'  # OpenJDK from Eclipse Temurin

      # STEP 3: Install Google Chrome
      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # STEP 4: Cache Maven dependencies
      # (So we don't re-download them on every run — saves time)
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # STEP 5: Build the project (compile all Java code)
      - name: Build Project
        run: mvn clean compile -q

      # STEP 6: Run the tests
      # Note: Tests run in headless mode (no visible browser window in CI)
      - name: Run Automation Tests
        run: mvn test
        # If tests fail, we still want to save the report (continue-on-error)
        continue-on-error: true

      # STEP 7: Upload the test report as a downloadable artifact
      # After the workflow runs, go to Actions → click the run → download artifacts
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()  # Upload even if tests failed
        with:
          name: test-report
          path: |
            test-output/ExtentReport.html
            target/surefire-reports/
          retention-days: 7  # Keep the report for 7 days
